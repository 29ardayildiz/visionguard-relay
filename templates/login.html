<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VisionGuard">
  <meta name="theme-color" content="#1c1c1e">
  <link rel="manifest" href="/manifest.json">
  <title>VisionGuard — Giriş</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1c1c1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 { font-size: 1.8rem; color: #fff; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { font-size: 2rem; }
    .subtitle { color: #8e8e93; font-size: 0.85rem; text-align: center; margin-top: 0.25rem; }
    label { display: block; color: #aeaeb2; font-size: 0.8rem; margin-bottom: 0.4rem; margin-top: 1.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%;
      background: #1c1c1e;
      border: 1px solid #3a3a3c;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #30d158; }
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.8rem;
      padding: 0.85rem;
      background: #30d158;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #28b34a; }
    .error {
      background: #3b0000;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-top: 1.2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>📷</span>
      <h1>VisionGuard</h1>
      <p class="subtitle">Güvenli Erişim</p>
    </div>
    {% if error %}<div class="error">Kullanıcı adı veya şifre hatalı.</div>{% endif %}
    <form method="post" action="/login">
      <label for="username">Kullanıcı Adı</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      <label for="password">Şifre</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Giriş Yap</button>
    </form>
  </div>
</body>
</html>
